services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: turbo
      POSTGRES_PASSWORD: turbo
      POSTGRES_DB: turbo_iptv
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turbo -d turbo_iptv"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://turbo:turbo@db:5432/turbo_iptv?sslmode=disable
      JWT_SECRET: dev-secret-development
      PORT: 8080
      CORS_ORIGINS: http://localhost:5173
      BOOTSTRAP_ADMIN_EMAIL: admin@turbo.local
      BOOTSTRAP_ADMIN_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
